name: Build

on:
  schedule:
    - cron: "0 0/2 * * *"
  workflow_dispatch:

concurrency:
  group: build-rules
  cancel-in-progress: true

permissions:
  contents: write

env:
  OUTPUT_DIR: .output
  PRECONV_DIR: preconv
  HAGEZI_DIR: hagezi
  STAMPARM_DIR: stamparm
  OISD_DIR: oisd
  FIREHOL_DIR: firehol

jobs:
  convert:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare release name
        run: |
          set -euo pipefail
          RELEASE_NAME="$(date +%Y%m%d%H%M)"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "[Meta] Release name set to ${RELEASE_NAME}"

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Switch to rules branch
        run: |
          set -euo pipefail
          echo "[Git] Checking and switching to rules branch"

          if git ls-remote --exit-code origin rules >/dev/null 2>&1; then
            echo "[Git] Remote branch 'rules' detected, fetching and switching"
            git fetch origin rules
            git switch rules
          else
            echo "[Git] Remote branch 'rules' not found, creating local branch"
            git switch -c rules
          fi

      - name: Clean generated files
        run: |
          set -euo pipefail
          echo "[Cleanup] Removing old generated files and temp directories"
          rm -rf "${OUTPUT_DIR}" "${PRECONV_DIR}" "${HAGEZI_DIR}" "${STAMPARM_DIR}" "${OISD_DIR}" "${FIREHOL_DIR}"

      - name: Install dependencies
        run: |
          set -euo pipefail
          echo "[Setup] Installing dependencies"
          sudo apt-get update
          sudo apt-get install -y curl git jq zip

      - name: Create folders
        run: |
          set -euo pipefail
          echo "[Setup] Creating working directories"
          mkdir -p "$OUTPUT_DIR" "$PRECONV_DIR" "$HAGEZI_DIR" "$STAMPARM_DIR" "$OISD_DIR" "$FIREHOL_DIR"
          mkdir -p "${PRECONV_DIR}/${HAGEZI_DIR}" "${PRECONV_DIR}/${STAMPARM_DIR}" "${PRECONV_DIR}/${OISD_DIR}" "${PRECONV_DIR}/${FIREHOL_DIR}"

      - name: Download and install Mihomo
        run: |
          set -euo pipefail

          echo "[Mihomo] Detecting latest Mihomo .deb release URL"
          MIHOMO_BIN_URL="$(
            curl -fLsS -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/MetaCubeX/mihomo/releases/latest |
            jq -r '.assets[] | select(.name | test("mihomo-linux-amd64-v.*\\.deb$")) | .browser_download_url' |
            head -n 1
          )"

          if [[ -z "$MIHOMO_BIN_URL" || "$MIHOMO_BIN_URL" == "null" ]]; then
            echo "[Mihomo] Failed to detect Mihomo .deb download URL" >&2
            exit 1
          fi

          echo "[Mihomo] Downloading from: ${MIHOMO_BIN_URL}"
          deb_path="${OUTPUT_DIR}/mihomo-linux-amd64.deb"
          curl -sSL "$MIHOMO_BIN_URL" -o "$deb_path"

          echo "[Mihomo] Installing Mihomo .deb (dpkg + apt-get -f)"
          sudo dpkg -i "$deb_path" || true
          sudo apt-get install -f -y

          rm -f "$deb_path"
          echo "[Mihomo] Mihomo installation finished"

      - name: Convert rulesets
        env:
          LC_ALL: C  # Use C locale to speed up domains/ips normalization
        run: |
          set -euo pipefail
          echo "[Convert] Starting ruleset conversion"

          # ---------- Utility Functions ----------
          download() {
            local url="$1" dest="$2"
            # -f: HTTP 4xx/5xx fail fast (not fail-safe)
            curl -fLsS --connect-timeout 10 --max-time 20 "$url" -o "$dest"
          }

          get_clean_name() {
            local path="$1"
            local name="${path##*/}"   # Remove path
            name="${name%.*}"          # Remove the last extension
            printf '%s\n' "$name"
          }

          # For onlydomains
          # Format: domain (# note)
          normalize_onlydomains() {
            local in="$1" out="$2" tmp
            tmp="${out}.tmp.$$"
            awk '
              /^[[:space:]]*#/ || /^[[:space:]]*$/ { print; next }
              {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
                if ($0 != "") print "+." $0
              }
            ' "$in" > "$tmp"
            mv "$tmp" "$out"
          }

          normalize_domains() {
            local in="$1" out="$2" tmp
            tmp="${out}.tmp.$$"
            awk -F',' '                                                          # Support separated by ','
              /^[[:space:]]*#/ || /^[[:space:]]*$/ { print; next }               # Skip comment/blank line
              {
                head=$1; gsub(/(^[[:space:]]+|[[:space:]]+$)/,"",head)           # Keep first column; remove leading and trailing whitespace
                if (head ~ /^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+(:[0-9]{1,5})?$/) {  # Match plain domain or domain:port (without path)
                  sub(/:[0-9]{1,5}$/, "", head)                                  # Remove port (if any)
                  print "+." head                                                # Add plus dot prefix
                }
              }
            ' "$in" > "$tmp"
            mv "$tmp" "$out"
          }

          normalize_iplist() {
            local in="$1" out="$2" tmp
            tmp="${out}.tmp.$$"
            awk -F',' '                                                  # Support separated by ','
              /^[[:space:]]*#/ || /^[[:space:]]*$/ { print; next }       # Keep comment/blank line
              {
                head=$1; gsub(/(^[[:space:]]+|[[:space:]]+$)/,"",head)   # Keep first column; remove leading and trailing whitespace
                if (!match(head,/^[0-9]+(\.[0-9]+){3}/)) next            # Simply match IPv4 prefix
          
                ip=substr(head,RSTART,RLENGTH)
                rest=substr(head,RSTART+RLENGTH)                         # ip + rest
          
                if (rest=="" || rest ~ /^:[0-9]+$/) cidr=32              # IP / IP:PORT
                else if (rest ~ /^\/[0-9]{1,2}$/) cidr=substr(rest,2)+0  # IP/CIDR
                else if (rest ~ /^:[0-9]+\/[0-9]{1,2}$/) {               # IP:PORT/CIDR
                  split(rest,a,"/"); cidr=a[2]+0
                } else next                                              # Drop
          
                if (cidr<0 || cidr>32) next                              # Drop illegal cidr32
                print ip"/"cidr                                          # Add cidr32 suffix
              }
            ' "$in" >"$tmp"
          
            mv "$tmp" "$out"
          }

          normalize_domains_iplist() {
            local in="$1" dom_out="$2" ip_out="$3"
            local dom_tmp="${dom_out}.tmp.$$" ip_tmp="${ip_out}.tmp.$$"
            awk -F',' -v dom_file="$dom_tmp" -v ip_file="$ip_tmp" '
              /^[[:space:]]*#/ || /^[[:space:]]*$/ {
                print > dom_file; print > ip_file; next
              }
              {
                head=$1; sub(/[[:space:]]+#.*$/, "", head); gsub(/(^[[:space:]]+|[[:space:]]+$)/, "", head)

                # DOMAIN(:PORT)
                if (head ~ /^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+(:[0-9]{1,5})?$/) {  # Match DOMAIN / DOMAIN:PORT
                  d=head; sub(/:[0-9]{1,5}$/, "", d)                             # Remove port (if any)
                  print "+." d > dom_file                                        # Add plus dot prefix
                  next
                }

                # IPv4(/CIDR)
                if (match(head,/^[0-9]+(\.[0-9]+){3}/)) {                  # Simply match IPv4 prefix
                  ip=substr(head,RSTART,RLENGTH)
                  rest=substr(head,RSTART+RLENGTH)                         # Split ip + rest

                  if (rest=="" || rest ~ /^:[0-9]+$/) cidr=32              # IP / IP:PORT
                  else if (rest ~ /^\/[0-9]{1,2}$/) cidr=substr(rest,2)+0  # IP/CIDR
                  else if (rest ~ /^:[0-9]+\/[0-9]{1,2}$/) {               # IP:PORT/CIDR
                    split(rest,a,"/"); cidr=a[2]+0
                  } else next                                              # Drop

                  if (cidr<0 || cidr>32) next                              # Drop illegal cidr32
                  print ip"/"cidr > ip_file
                }
              }
            ' "$in"
          
            mv "$dom_tmp" "$dom_out"
            mv "$ip_tmp" "$ip_out"
          }

          convert_domain() {
            local src="$1" out="$2"
            mihomo convert-ruleset domain text "$src" "$out"
          }

          convert_ipcidr() {
            local src="$1" out="$2"
            mihomo convert-ruleset ipcidr text "$src" "$out"
          }

          HAGEZI_BASE="https://raw.githubusercontent.com/hagezi/dns-blocklists/main"
          HAGEZI_CDN_BASE="https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest"
          STAMPARM_BASE="https://raw.githubusercontent.com/stamparm"
          OISD_BASE="https://raw.githubusercontent.com/sjhgvr/oisd/main"
          FIREHOL_BASE="https://raw.githubusercontent.com/firehol/blocklist-ipsets/master"

          #####################################
          # 1. HaGeZi wildcard only domains
          #####################################
          echo "[Convert] 1/7 HaGeZi wildcard-only domains"

          onlydomains_files=(
            light-onlydomains.txt
            multi-onlydomains.txt
            pro-onlydomains.txt
            pro.mini-onlydomains.txt
            pro.plus-onlydomains.txt
            pro.plus.mini-onlydomains.txt
            ultimate-onlydomains.txt
            ultimate.mini-onlydomains.txt
            tif-onlydomains.txt
            tif.medium-onlydomains.txt
            tif.mini-onlydomains.txt
            doh-onlydomains.txt
            doh-vpn-proxy-bypass-onlydomains.txt
            dyndns-onlydomains.txt
            spam-tlds-onlydomains.txt
            spam-tlds-allow-onlydomains.txt
          )

          declare -A onlydomains_outmap=(
            [multi-onlydomains.txt]=normal-onlydomains.txt
          )

          for src in "${onlydomains_files[@]}"; do
            dest="${onlydomains_outmap[$src]:-$src}"
            clean_name="${dest%-onlydomains.txt}"
            file_path="${PRECONV_DIR}/${HAGEZI_DIR}/${clean_name}.txt"
            echo "  [HaGeZi wildcard only domains] ${src} -> ${clean_name}.mrs"

            download "${HAGEZI_BASE}/wildcard/${src}" "$file_path"
            normalize_onlydomains "$file_path" "$file_path"
            convert_domain "$file_path" "${HAGEZI_DIR}/${clean_name}.mrs"
          done

          ############################
          # 2. HaGeZi domains
          ############################
          echo "[Convert] 2/7 HaGeZi domains"

          domain_files=(
            nrd7.txt
            nrd14-8.txt
            nrd21-15.txt
            nrd28-22.txt
            nrd35-29.txt
            dga7.txt
            dga14.txt
            dga30.txt
          )

          for src in "${domain_files[@]}"; do
            clean_name="$(get_clean_name "$src")"
            file_path="${PRECONV_DIR}/${HAGEZI_DIR}/${clean_name}.txt"
            echo "  [HaGeZi domains] ${src} -> ${clean_name}.mrs"

            download "${HAGEZI_BASE}/domains/${src}" "$file_path"
            normalize_onlydomains "$file_path" "$file_path"
            convert_domain "$file_path" "${HAGEZI_DIR}/${clean_name}.mrs"
          done

          ############################
          # 3. HaGeZi IPs
          ############################
          echo "[Convert] 3/7 HaGeZi IPs"

          ip_files=(
            tif.txt
            doh.txt
          )

          declare -A ips_outmap=(
            [tif.txt]=tif-ips.txt
            [doh.txt]=doh-ips.txt
          )

          for src in "${ip_files[@]}"; do
            dest="${ips_outmap[$src]:-$src}"
            clean_name="$(get_clean_name "$dest")"
            file_path="${PRECONV_DIR}/${HAGEZI_DIR}/${clean_name}.txt"

            echo "  [HaGeZi IPs] ${src} -> ${clean_name}.mrs"

            download "${HAGEZI_CDN_BASE}/ips/${src}" "$file_path"
            normalize_iplist "$file_path" "$file_path"
            convert_ipcidr "$file_path" "${HAGEZI_DIR}/${clean_name}.mrs"
          done

          ####################################
          # 4. stamparm maltrail domains
          ####################################
          echo "[Convert] 4/7 stamparm maltrail domains"

          # maltrail-malware
          clean_name="maltrail-malware"
          malware_path="${PRECONV_DIR}/${STAMPARM_DIR}/${clean_name}.txt"
          echo "  [stamparm maltrail] maltrail-malware-domains.txt -> ${clean_name}.mrs"

          download "${STAMPARM_BASE}/aux/master/maltrail-malware-domains.txt" "$malware_path"
          normalize_domains "$malware_path" "$malware_path"
          convert_domain "$malware_path" "${STAMPARM_DIR}/${clean_name}.mrs"

          # maltrail-static-trails -> domains + ips
          static_raw="${OUTPUT_DIR}/maltrail-static-trails-raw.txt"
          domains_clean_name="maltrail-static-domains"
          domains_path="${PRECONV_DIR}/${STAMPARM_DIR}/${domains_clean_name}.txt"
          ips_clean_name="maltrail-static-ips"
          ips_path="${PRECONV_DIR}/${STAMPARM_DIR}/${ips_clean_name}.txt"
          echo "  [stamparm maltrail] maltrail-static-trails.txt -> ${domains_clean_name}.mrs + ${ips_clean_name}.mrs"
          
          download "${STAMPARM_BASE}/aux/master/maltrail-static-trails.txt" "$static_raw"
          normalize_domains_iplist "$static_raw" "$domains_path" "$ips_path"
          convert_domain "$domains_path" "${STAMPARM_DIR}/${domains_clean_name}.mrs"
          convert_ipcidr "$ips_path" "${STAMPARM_DIR}/${ips_clean_name}.mrs"

          ############################
          # 5. stamparm ipsum
          ############################
          echo "[Convert] 5/7 stamparm ipsum (IP list)"

          ip_files=(
            1.txt
            2.txt
            3.txt
            4.txt
          )

          declare -A ipsum_outmap=(
            [1.txt]=ipsum-level1.txt
            [2.txt]=ipsum-level2.txt
            [3.txt]=ipsum-level3.txt
            [4.txt]=ipsum-level4.txt
          )

          for src in "${ip_files[@]}"; do
            dest="${ipsum_outmap[$src]:-$src}"
            clean_name="$(get_clean_name "$dest")"
            file_path="${PRECONV_DIR}/${STAMPARM_DIR}/${clean_name}.txt"
            echo "  [stamparm ipsum] ${src} -> ${clean_name}.mrs"

            download "${STAMPARM_BASE}/ipsum/master/levels/${src}" "$file_path"
            normalize_iplist "$file_path" "$file_path"
            convert_ipcidr "$file_path" "${STAMPARM_DIR}/${clean_name}.mrs"
          done

          ##################################
          # 6. OISD wildcard only domains
          ##################################
          echo "[Convert] 6/7 OISD wildcard only domains"

          wildcard_files=(
            domainswild2_big.txt
            domainswild2_small.txt
            domainswild2_nsfw.txt
            domainswild2_nsfw_small.txt
          )

          declare -A oisd_wildcard_outmap=(
            [domainswild2_big.txt]=oisd_big.txt
            [domainswild2_small.txt]=oisd_small.txt
            [domainswild2_nsfw.txt]=oisd_nsfw.txt
            [domainswild2_nsfw_small.txt]=oisd_nsfw_small.txt
          )

          for src in "${wildcard_files[@]}"; do
            dest="${oisd_wildcard_outmap[$src]:-$src}"
            clean_name="$(get_clean_name "$dest")"
            file_path="${PRECONV_DIR}/${OISD_DIR}/${clean_name}.txt"

            echo "  [OISD wildcard] ${src} -> ${clean_name}.mrs"

            download "${OISD_BASE}/${src}" "$file_path"
            normalize_onlydomains "$file_path" "$file_path"
            convert_domain "$file_path" "${OISD_DIR}/${clean_name}.mrs"
          done

          ##################################
          # 7. FireHOL blocklist-ipsets
          ##################################
          echo "[Convert] 7/7 FireHOL ipsets"

          ipsets_files=(
            firehol_level1.netset
            firehol_level2.netset
            firehol_level3.netset
            firehol_level4.netset
            tor_exits.ipset
            tor_exits_1d.ipset
            tor_exits_7d.ipset
            tor_exits_30d.ipset
            firehol_anonymous.netset
            dm_tor.ipset
            et_tor.ipset
          )

          for src in "${ipsets_files[@]}"; do
            clean_name="$(get_clean_name "$src")"
            file_path="${PRECONV_DIR}/${FIREHOL_DIR}/${clean_name}.txt"

            echo "  [FireHol blocklist-ipsets] ${src} -> ${clean_name}.mrs"

            download "${FIREHOL_BASE}/${src}" "$file_path"
            normalize_iplist "$file_path" "$file_path"
            convert_ipcidr "$file_path" "${FIREHOL_DIR}/${clean_name}.mrs"
          done

          echo "[Convert] Ruleset conversion completed"

      - name: Delete temp files
        run: |
          set -euo pipefail
          echo "[Cleanup] Deleting temp directory ${OUTPUT_DIR}"
          rm -rf "${OUTPUT_DIR}"

      - name: Push assets to rules branch
        run: |
          set -euo pipefail

          echo "[Git] Configuring git user"
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          echo "[Git] Adding generated rule files and preconv text"
          git add "${HAGEZI_DIR}" "${STAMPARM_DIR}" "${OISD_DIR}" "${FIREHOL_DIR}"
          git add "${PRECONV_DIR}"

          # Exit if no changes to commit
          if git diff --cached --quiet; then
            echo "[Git] No changes to commit."
            exit 0
          fi

          echo "[Git] Committing changes with message: ${RELEASE_NAME}"
          git commit -m "${RELEASE_NAME}"

          echo "[Git] Pushing to rules branch (force push)"
          # (Optional) Keep `--force` avoid the infinite accumulation of large files in history
          git push origin HEAD:rules --force
          echo "[Git] Push completed"

      - name: Purge jsdelivr CDN
        run: |
          set -euo pipefail
          shopt -s nullglob

          echo "[Purge] Purging jsDelivr cache for generated files"

          purge() {
            local path="$1"
            local url="https://purge.jsdelivr.net/gh/${{ github.repository }}@rules/${path}"

            echo "  [Purge] ${path}"

            if ! curl -fLsS --connect-timeout 10 --max-time 30 "$url" -o /dev/null; then
              echo "  [Purge WARN] Failed to purge ${path}" >&2
            fi
          }

          echo "[Purge] HaGeZi rules"
          for file in "${HAGEZI_DIR}"/*.mrs; do
            # Pass relative path explicitly
            purge "${HAGEZI_DIR}/$(basename "$file")"
          done

          echo "[Purge] stamparm rules"
          for file in "${STAMPARM_DIR}"/*.mrs; do
            purge "${STAMPARM_DIR}/$(basename "$file")"
          done

          echo "[Purge] OISD rules"
          for file in "${OISD_DIR}"/*.mrs; do
            purge "${OISD_DIR}/$(basename "$file")"
          done

          echo "[Purge] FireHol rules"
          for file in "${FIREHOL_DIR}"/*.mrs; do
            purge "${FIREHOL_DIR}/$(basename "$file")"
          done

          echo "[Purge] preconv text files"
          for file in "${PRECONV_DIR}"/*.txt; do
            purge "${PRECONV_DIR}/$(basename "$file")"
          done

          echo "[Purge] jsDelivr purge step finished"
