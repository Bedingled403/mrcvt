name: Build

on:
  schedule:
    - cron: "0 0-20/2 * * *"
  workflow_dispatch:

concurrency:
  group: build-rules
  cancel-in-progress: true

permissions:
  contents: write

env:
  OUTPUT_DIR: .output
  PRECONV_DIR: preconv
  HAGEZI_DIR: hagezi
  STAMPARM_DIR: stamparm
  OISD_DIR: oisd

jobs:
  convert:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare release name
        run: |
          set -euo pipefail
          RELEASE_NAME="$(date +%Y%m%d%H%M)"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "[Meta] Release name set to ${RELEASE_NAME}"

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Switch to rules branch
        run: |
          set -euo pipefail
          echo "[Git] Checking and switching to rules branch"

          if git ls-remote --exit-code origin rules >/dev/null 2>&1; then
            echo "[Git] Remote branch 'rules' detected, fetching and switching"
            git fetch origin rules
            git switch rules
          else
            echo "[Git] Remote branch 'rules' not found, creating local branch"
            git switch -c rules
          fi

      - name: Clean generated files
        run: |
          set -euo pipefail
          echo "[Cleanup] Removing old generated files and temp directories"
          rm -rf "${OUTPUT_DIR}" "${PRECONV_DIR}" "${HAGEZI_DIR}" "${STAMPARM_DIR}" "${OISD_DIR}"

      - name: Install dependencies
        run: |
          set -euo pipefail
          echo "[Setup] Installing dependencies (curl git jq zip)"
          sudo apt-get update
          sudo apt-get install -y curl git jq zip

      - name: Create folders
        run: |
          set -euo pipefail
          echo "[Setup] Creating working directories"
          mkdir -p "$OUTPUT_DIR" "$PRECONV_DIR" "$HAGEZI_DIR" "$STAMPARM_DIR" "$OISD_DIR"

      - name: Download and install Mihomo
        run: |
          set -euo pipefail

          echo "[Mihomo] Detecting latest Mihomo .deb release URL"
          MIHOMO_BIN_URL="$(
            curl -fLsS -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/MetaCubeX/mihomo/releases/latest |
            jq -r '.assets[] | select(.name | test("mihomo-linux-amd64-v.*\\.deb$")) | .browser_download_url' |
            head -n 1
          )"

          if [[ -z "$MIHOMO_BIN_URL" || "$MIHOMO_BIN_URL" == "null" ]]; then
            echo "[Mihomo] Failed to detect Mihomo .deb download URL" >&2
            exit 1
          fi

          echo "[Mihomo] Downloading from: ${MIHOMO_BIN_URL}"
          deb_path="${OUTPUT_DIR}/mihomo-linux-amd64.deb"
          curl -sSL "$MIHOMO_BIN_URL" -o "$deb_path"

          echo "[Mihomo] Installing Mihomo .deb (dpkg + apt-get -f)"
          sudo dpkg -i "$deb_path" || true
          sudo apt-get install -f -y

          rm -f "$deb_path"
          echo "[Mihomo] Mihomo installation finished"

      - name: Convert rulesets
        run: |
          set -euo pipefail
          echo "[Convert] Starting ruleset conversion"

          # ---------- Utility Functions ----------
          download() {
            local url="$1" dest="$2"
            # -f: HTTP 4xx/5xx fail fast (not fail-safe)
            curl -fLsS --connect-timeout 10 --max-time 30 "$url" -o "$dest"
          }

          add_plus_dot_prefix() {
            local file="$1"
            sed -i '/^[[:space:]]*#/!{
              /^[[:space:]]*$/! s/^\([[:space:]]*\)\([^[:space:]]\)/\1+.\2/
            }' "$file"
          }

          add_cidr32_suffix() {
            local file="$1"
            sed -i '/^[[:space:]]*#/!{
              /^[[:space:]]*$/! s/$/\/32/
            }' "$file"
          }

          convert_domain() {
            local src="$1" out="$2"
            mihomo convert-ruleset domain text "$src" "$out"
          }

          convert_ipcidr() {
            local src="$1" out="$2"
            mihomo convert-ruleset ipcidr text "$src" "$out"
          }

          HAGEZI_BASE="https://raw.githubusercontent.com/hagezi/dns-blocklists/main"
          STAMPARM_BASE="https://raw.githubusercontent.com/stamparm"
          OISD_BASE="https://raw.githubusercontent.com/sjhgvr/oisd/main"

          #####################################
          # 1. Hagezi wildcard only domains
          #####################################
          echo "[Convert] 1/6 Hagezi wildcard-only domains"

          wildcard_files=(
            light-onlydomains.txt
            multi-onlydomains.txt
            pro-onlydomains.txt
            pro.mini-onlydomains.txt
            pro.plus-onlydomains.txt
            pro.plus.mini-onlydomains.txt
            ultimate-onlydomains.txt
            ultimate.mini-onlydomains.txt
            tif-onlydomains.txt
            tif.medium-onlydomains.txt
            tif.mini-onlydomains.txt
            doh-onlydomains.txt
            doh-vpn-proxy-bypass-onlydomains.txt
            dyndns-onlydomains.txt
            spam-tlds-onlydomains.txt
            spam-tlds-allow-onlydomains.txt
          )

          declare -A wildcard_outmap=(
            [multi-onlydomains.txt]=normal-onlydomains.txt
          )

          for src in "${wildcard_files[@]}"; do
            dest="${wildcard_outmap[$src]:-$src}"
            src_path="${OUTPUT_DIR}/${dest}"

            clean_name="${dest%-onlydomains.txt}"
            echo "  [Hagezi wildcard] ${src} -> ${clean_name}.mrs"

            download "${HAGEZI_BASE}/wildcard/${src}" "$src_path"
            add_plus_dot_prefix "$src_path"
            cp "$src_path" "${PRECONV_DIR}/${clean_name}.txt"

            convert_domain "$src_path" "${HAGEZI_DIR}/${clean_name}.mrs"
          done

          ############################
          # 2. Hagezi domains
          ############################
          echo "[Convert] 2/6 Hagezi domains"

          domain_files=(
            nrd7.txt
            nrd14-8.txt
            nrd21-15.txt
            nrd28-22.txt
            nrd35-29.txt
            dga7.txt
            dga14.txt
            dga30.txt
          )

          for src in "${domain_files[@]}"; do
            src_path="${OUTPUT_DIR}/${src}"
            clean_name="${src%.txt}"
            echo "  [Hagezi domains] ${src} -> ${clean_name}.mrs"

            download "${HAGEZI_BASE}/domains/${src}" "$src_path"
            add_plus_dot_prefix "$src_path"
            cp "$src_path" "${PRECONV_DIR}/${src}"

            convert_domain "$src_path" "${HAGEZI_DIR}/${clean_name}.mrs"
          done

          ############################
          # 3. Hagezi ips
          ############################
          echo "[Convert] 3/6 Hagezi IPs"

          tif_ips_src="${OUTPUT_DIR}/tif-ips.txt"
          echo "  [Hagezi IPs] tif.txt -> tif-ips.mrs"
          download "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/ips/tif.txt" "$tif_ips_src"
          add_cidr32_suffix "$tif_ips_src"
          cp "$tif_ips_src" "${PRECONV_DIR}/tif-ips.txt"
          convert_ipcidr "$tif_ips_src" "${HAGEZI_DIR}/tif-ips.mrs"

          ###########################################
          # 4. stamparm maltrail-malware-domains
          ###########################################
          echo "[Convert] 4/6 stamparm maltrail-malware-domains"

          maltrail_src="${OUTPUT_DIR}/maltrail-malware.txt"
          echo "  [stamparm maltrail] maltrail-malware-domains.txt -> maltrail-malware.mrs"
          download "${STAMPARM_BASE}/aux/master/maltrail-malware-domains.txt" "$maltrail_src"
          add_plus_dot_prefix "$maltrail_src"
          cp "$maltrail_src" "${PRECONV_DIR}/maltrail-malware.txt"
          convert_domain "$maltrail_src" "${STAMPARM_DIR}/maltrail-malware.mrs"

          ############################
          # 5. stamparm ipsum
          ############################
          echo "[Convert] 5/6 stamparm ipsum (IP list)"

          ipsum_src="${OUTPUT_DIR}/ipsum-level1.txt"
          echo "  [stamparm ipsum] 1.txt -> ipsum-level1.mrs"
          download "${STAMPARM_BASE}/ipsum/master/levels/1.txt" "$ipsum_src"
          add_cidr32_suffix "$ipsum_src"
          cp "$ipsum_src" "${PRECONV_DIR}/ipsum-level1.txt"
          convert_ipcidr "$ipsum_src" "${STAMPARM_DIR}/ipsum-level1.mrs"

          ##################################
          # 6. OISD wildcard only domains
          ##################################
          echo "[Convert] 6/6 OISD wildcard-only domains"

          wildcard_files=(
            domainswild2_big.txt
            domainswild2_small.txt
            domainswild2_nsfw.txt
            domainswild2_nsfw_small.txt
          )

          declare -A oisd_wildcard_outmap=(
            [domainswild2_big.txt]=oisd_big.txt
            [domainswild2_small.txt]=oisd_small.txt
            [domainswild2_nsfw.txt]=oisd_nsfw.txt
            [domainswild2_nsfw_small.txt]=oisd_nsfw_small.txt
          )

          for src in "${wildcard_files[@]}"; do
            dest="${oisd_wildcard_outmap[$src]:-$src}"
            src_path="${OUTPUT_DIR}/${dest}"
            clean_name="${dest%.txt}"

            echo "  [OISD wildcard] ${src} -> ${clean_name}.mrs"

            download "${OISD_BASE}/${src}" "$src_path"
            add_plus_dot_prefix "$src_path"
            cp "$src_path" "${PRECONV_DIR}/${clean_name}.txt"

            convert_domain "$src_path" "${OISD_DIR}/${clean_name}.mrs"
          done

          echo "[Convert] Ruleset conversion completed"

      - name: Delete temp files
        run: |
          set -euo pipefail
          echo "[Cleanup] Deleting temp directory ${OUTPUT_DIR}"
          rm -rf "${OUTPUT_DIR}"

      - name: Push assets to rules branch
        run: |
          set -euo pipefail

          echo "[Git] Configuring git user"
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          echo "[Git] Adding generated rule files and preconv text"
          git add "${HAGEZI_DIR}" "${STAMPARM_DIR}" "${OISD_DIR}"
          git add "${PRECONV_DIR}"

          # Exit if no changes to commit
          if git diff --cached --quiet; then
            echo "[Git] No changes to commit."
            exit 0
          fi

          echo "[Git] Committing changes with message: ${RELEASE_NAME}"
          git commit -m "${RELEASE_NAME}"

          echo "[Git] Pushing to rules branch (force push)"
          # (Optional) Keep `--force` avoid the infinite accumulation of large files in history
          git push origin HEAD:rules --force
          echo "[Git] Push completed"

      - name: Purge jsdelivr CDN
        run: |
          set -euo pipefail
          shopt -s nullglob

          echo "[Purge] Purging jsDelivr cache for generated files"

          purge() {
            local path="$1"
            local url="https://purge.jsdelivr.net/gh/${{ github.repository }}@rules/${path}"

            echo "  [Purge] ${path}"

            if ! curl -fLsS --connect-timeout 10 --max-time 30 "$url" -o /dev/null; then
              echo "  [Purge WARN] Failed to purge ${path}" >&2
            fi
          }

          echo "[Purge] Hagezi rules"
          for file in "${HAGEZI_DIR}"/*.mrs; do
            # Pass relative path explicitly
            purge "${HAGEZI_DIR}/$(basename "$file")"
          done

          echo "[Purge] stamparm rules"
          for file in "${STAMPARM_DIR}"/*.mrs; do
            purge "${STAMPARM_DIR}/$(basename "$file")"
          done

          echo "[Purge] OISD rules"
          for file in "${OISD_DIR}"/*.mrs; do
            purge "${OISD_DIR}/$(basename "$file")"
          done

          echo "[Purge] preconv text files"
          for file in "${PRECONV_DIR}"/*.txt; do
            purge "${PRECONV_DIR}/$(basename "$file")"
          done

          echo "[Purge] jsDelivr purge step finished"
